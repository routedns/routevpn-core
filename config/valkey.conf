# Valkey Configuration File

# Network
bind 0.0.0.0
port 6379
protected-mode no

# General
daemonize no
loglevel notice

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory
maxmemory-policy allkeys-lru

# Security (add password if needed)
# requirepass yourpassword
