<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteVPN — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:'#6366f1',surface:'#0f172a',card:'#1e293b',border:'#334155'}}}}</script>
    <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-surface text-gray-200 min-h-screen flex" x-data="{sidebar:true}">
    <!-- Sidebar -->
    <aside class="w-64 bg-card border-r border-border min-h-screen p-5 flex flex-col shrink-0 max-lg:fixed max-lg:z-40 max-lg:inset-y-0 max-lg:left-0 transition-transform" :class="sidebar?'translate-x-0':'-translate-x-full lg:translate-x-0'">
        <div class="flex items-center gap-2 mb-8">
            <div class="w-9 h-9 rounded-lg bg-brand flex items-center justify-center text-white font-bold text-lg">R</div>
            <span class="text-xl font-bold text-white">RouteVPN</span>
        </div>
        <nav class="flex flex-col gap-1 flex-1">
            <a href="/admin/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 text-sm font-medium transition">
                <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
                Dashboard
            </a>
            <a href="/admin/resellers" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 text-sm font-medium transition">
                <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Resellers
            </a>
            <a href="/admin/packages" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 text-sm font-medium transition">
                <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Packages
            </a>
            <a href="/admin/peers" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 text-sm font-medium transition">
                <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                VPN Peers
            </a>
        </nav>
        <div class="border-t border-border pt-4 mt-4">
            <div class="text-xs text-gray-500 mb-2">{{.email}}</div>
            <a href="/auth/logout" class="text-xs text-red-400 hover:text-red-300 transition">Sign Out</a>
        </div>
    </aside>
    <!-- Mobile toggle -->
    <button @click="sidebar=!sidebar" class="lg:hidden fixed top-4 left-4 z-50 bg-card p-2 rounded-lg border border-border">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <!-- Main content -->
    <main class="flex-1 p-6 lg:p-10 overflow-auto min-h-screen">
        {{embed}}
    </main>
</body>
</html>
