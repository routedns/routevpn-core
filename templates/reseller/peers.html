<div class="max-w-7xl mx-auto" x-data="{showForm:false, qrId:null}">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-2xl font-bold text-white">VPN Peers</h1>
        <button @click="showForm=!showForm" class="bg-brand hover:bg-brand/90 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">+ New Peer</button>
    </div>

    <!-- Create Peer Form -->
    <div x-show="showForm" x-cloak class="bg-card border border-border rounded-2xl p-6 mb-6">
        <form method="POST" action="/reseller/peers" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">WhatsApp Number</label>
                <input type="text" name="whatsapp_number" required placeholder="+880XXXXXXXXXX" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-brand/50">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Package</label>
                <select name="package_id" required class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand/50">
                    <option value="">Select package...</option>
                    {{range .packages}}
                    <option value="{{.ID}}">{{.Name}} — ৳{{.PriceBDT.StringFixed 2}} ({{.DurationDays}}d)</option>
                    {{end}}
                </select>
            </div>
            <div class="flex items-end">
                <button type="submit" class="bg-brand hover:bg-brand/90 text-white text-sm font-semibold px-6 py-2 rounded-lg transition">Create Peer</button>
            </div>
        </form>
    </div>

    <!-- Search & Filter -->
    <form method="GET" action="/reseller/peers/search" class="bg-card border border-border rounded-2xl p-5 mb-6">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Search</label>
                <input type="text" name="q" value="{{.search}}" placeholder="WhatsApp or Public Key..." class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-brand/50">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Status</label>
                <select name="status" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand/50">
                    <option value="">All</option>
                    <option value="active" {{if eq .status "active"}}selected{{end}}>Active</option>
                    <option value="expired" {{if eq .status "expired"}}selected{{end}}>Expired</option>
                </select>
            </div>
            <div class="flex items-end">
                <button type="submit" class="bg-brand hover:bg-brand/90 text-white text-sm font-semibold px-6 py-2 rounded-lg transition">Search</button>
            </div>
        </div>
    </form>

    <!-- QR Modal -->
    <div x-show="qrId" x-cloak @click.self="qrId=null" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-2xl p-6 max-w-sm w-full text-center">
            <h3 class="text-lg font-bold text-white mb-4">QR Code</h3>
            <img :src="'/reseller/peers/'+qrId+'/qr'" alt="QR" class="mx-auto rounded-lg mb-4" width="300" height="300">
            <button @click="qrId=null" class="text-sm text-gray-400 hover:text-white transition">Close</button>
        </div>
    </div>

    <!-- Peers Table -->
    <div class="bg-card border border-border rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-border text-left">
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">WhatsApp</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">IP</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Package</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Expiry</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Status</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .peers}}
                    <tr class="border-b border-border/50 hover:bg-white/[0.02] transition">
                        <td class="px-5 py-3 text-white font-medium">{{.WhatsappNumber}}</td>
                        <td class="px-5 py-3 text-gray-300 font-mono text-xs">{{.AssignedIP}}</td>
                        <td class="px-5 py-3 text-gray-300">{{.PackageName}}</td>
                        <td class="px-5 py-3 text-gray-400">{{.ExpiryDate.Format "Jan 02, 2006"}}</td>
                        <td class="px-5 py-3">
                            {{if eq .Status "active"}}
                            <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-0.5 rounded-full text-xs font-bold">Active</span>
                            {{else}}
                            <span class="bg-red-500/10 text-red-400 border border-red-500/20 px-2.5 py-0.5 rounded-full text-xs font-bold">Expired</span>
                            {{end}}
                        </td>
                        <td class="px-5 py-3">
                            <div class="flex gap-2">
                                <a href="/reseller/peers/{{.ID}}/config" class="bg-white/5 hover:bg-white/10 border border-border text-gray-300 text-xs px-3 py-1.5 rounded-lg transition">⬇ Config</a>
                                <button @click="qrId={{.ID}}" class="bg-white/5 hover:bg-white/10 border border-border text-gray-300 text-xs px-3 py-1.5 rounded-lg transition">QR</button>
                            </div>
                        </td>
                    </tr>
                    {{else}}
                    <tr><td colspan="6" class="px-5 py-8 text-center text-gray-500">No peers yet. Create one above.</td></tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</div>
