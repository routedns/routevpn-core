<div class="max-w-7xl mx-auto">
    <h1 class="text-2xl font-bold text-white mb-8">Reseller Dashboard</h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-10">
        <div class="bg-card border border-border rounded-2xl p-5">
            <div class="text-xs uppercase tracking-wider text-gray-500 font-semibold mb-1">Balance</div>
            <div class="text-3xl font-bold text-brand">৳{{.balance}}</div>
        </div>
        <div class="bg-card border border-border rounded-2xl p-5">
            <div class="text-xs uppercase tracking-wider text-gray-500 font-semibold mb-1">Total Peers</div>
            <div class="text-3xl font-bold text-white">{{.totalPeers}}</div>
        </div>
        <div class="bg-card border border-border rounded-2xl p-5">
            <div class="text-xs uppercase tracking-wider text-gray-500 font-semibold mb-1">Active Peers</div>
            <div class="text-3xl font-bold text-emerald-400">{{.activePeers}}</div>
        </div>
        <div class="bg-card border border-border rounded-2xl p-5">
            <div class="text-xs uppercase tracking-wider text-gray-500 font-semibold mb-1">Total Spent</div>
            <div class="text-3xl font-bold text-amber-400">৳{{.totalSpent}}</div>
        </div>
    </div>
    <div class="flex gap-4">
        <a href="/reseller/peers" class="bg-brand hover:bg-brand/90 text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition">Manage Peers</a>
        <a href="/reseller/transactions" class="bg-white/5 hover:bg-white/10 border border-border text-gray-300 text-sm font-semibold px-5 py-2.5 rounded-lg transition">View Transactions</a>
    </div>
</div>
