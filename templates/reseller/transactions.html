<div class="max-w-7xl mx-auto">
    <h1 class="text-2xl font-bold text-white mb-8">Transaction History</h1>

    <div class="bg-card border border-border rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-border text-left">
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Date</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Type</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Amount</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Note</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .transactions}}
                    <tr class="border-b border-border/50 hover:bg-white/[0.02] transition">
                        <td class="px-5 py-3 text-gray-400">{{.CreatedAt.Format "Jan 02, 2006 03:04 PM"}}</td>
                        <td class="px-5 py-3">
                            {{if eq .Type "credit"}}
                            <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-0.5 rounded-full text-xs font-bold">Credit</span>
                            {{else}}
                            <span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-0.5 rounded-full text-xs font-bold">Debit</span>
                            {{end}}
                        </td>
                        <td class="px-5 py-3 text-white font-bold">৳{{.Amount.StringFixed 2}}</td>
                        <td class="px-5 py-3 text-gray-400">{{.Note}}</td>
                    </tr>
                    {{else}}
                    <tr><td colspan="4" class="px-5 py-8 text-center text-gray-500">No transactions yet</td></tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</div>
