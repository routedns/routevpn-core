<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteVPN — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:'#6366f1',surface:'#0f172a',card:'#1e293b',border:'#334155'}}}}</script>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-brand flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4">R</div>
            <h1 class="text-2xl font-bold text-white">RouteVPN</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
        </div>
        {{if .error}}<div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3 mb-4">{{.error}}</div>{{end}}
        <form method="POST" action="/auth/login" class="bg-card border border-border rounded-2xl p-6 space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Email</label>
                <input type="email" name="email" required class="w-full bg-surface border border-border rounded-lg px-3.5 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand transition" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Password</label>
                <input type="password" name="password" required class="w-full bg-surface border border-border rounded-lg px-3.5 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-brand hover:bg-brand/90 text-white font-semibold py-2.5 rounded-lg text-sm transition">Sign In</button>
        </form>
    </div>
</body>
</html>
