<div class="max-w-7xl mx-auto">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-2xl font-bold text-white">VPN Peers</h1>
    </div>

    <!-- Search & Filter -->
    <form method="GET" action="/admin/peers/search" class="bg-card border border-border rounded-2xl p-5 mb-6">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Search</label>
                <input type="text" name="q" value="{{.search}}" placeholder="WhatsApp number or Public Key..." class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-brand/50">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Status</label>
                <select name="status" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand/50">
                    <option value="">All</option>
                    <option value="active" {{if eq .status "active"}}selected{{end}}>Active</option>
                    <option value="expired" {{if eq .status "expired"}}selected{{end}}>Expired</option>
                </select>
            </div>
            <div class="flex items-end">
                <button type="submit" class="bg-brand hover:bg-brand/90 text-white text-sm font-semibold px-6 py-2 rounded-lg transition">Search</button>
            </div>
        </div>
    </form>

    <!-- Peers Table -->
    <div class="bg-card border border-border rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-border text-left">
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">WhatsApp</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">IP</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Package</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Reseller</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Expiry</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Status</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .peers}}
                    <tr class="border-b border-border/50 hover:bg-white/[0.02] transition">
                        <td class="px-5 py-3 text-white font-medium">{{.WhatsappNumber}}</td>
                        <td class="px-5 py-3 text-gray-300 font-mono text-xs">{{.AssignedIP}}</td>
                        <td class="px-5 py-3 text-gray-300">{{.PackageName}}</td>
                        <td class="px-5 py-3 text-gray-400">{{.ResellerEmail}}</td>
                        <td class="px-5 py-3 text-gray-400">{{.ExpiryDate.Format "Jan 02, 2006"}}</td>
                        <td class="px-5 py-3">
                            {{if eq .Status "active"}}
                            <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-0.5 rounded-full text-xs font-bold">Active</span>
                            {{else}}
                            <span class="bg-red-500/10 text-red-400 border border-red-500/20 px-2.5 py-0.5 rounded-full text-xs font-bold">Expired</span>
                            {{end}}
                        </td>
                    </tr>
                    {{else}}
                    <tr><td colspan="6" class="px-5 py-8 text-center text-gray-500">No peers found</td></tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</div>
