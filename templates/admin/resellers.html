<div class="max-w-7xl mx-auto" x-data="{showForm:false, balanceId:null, balanceAmount:''}">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-2xl font-bold text-white">Resellers</h1>
        <button @click="showForm=!showForm" class="bg-brand hover:bg-brand/90 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">+ New Reseller</button>
    </div>

    <!-- Create Form -->
    <div x-show="showForm" x-cloak class="bg-card border border-border rounded-2xl p-6 mb-6">
        <form method="POST" action="/admin/resellers" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Email</label>
                <input type="email" name="email" required class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand/50">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand/50">
            </div>
            <div class="flex items-end">
                <button type="submit" class="bg-brand hover:bg-brand/90 text-white text-sm font-semibold px-6 py-2 rounded-lg transition">Create</button>
            </div>
        </form>
    </div>

    <!-- Resellers Table -->
    <div class="bg-card border border-border rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-border text-left">
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Email</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Balance (BDT)</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Created</th>
                        <th class="px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .resellers}}
                    <tr class="border-b border-border/50 hover:bg-white/[0.02] transition">
                        <td class="px-5 py-3 text-white font-medium">{{.Email}}</td>
                        <td class="px-5 py-3">
                            <span class="bg-brand/10 text-brand border border-brand/20 px-2.5 py-0.5 rounded-full text-xs font-bold">৳{{.Balance.StringFixed 2}}</span>
                        </td>
                        <td class="px-5 py-3 text-gray-400">{{.CreatedAt.Format "Jan 02, 2006"}}</td>
                        <td class="px-5 py-3">
                            <form method="POST" action="/admin/resellers/{{.ID}}/balance" class="flex items-center gap-2">
                                <input type="number" name="amount" step="0.01" min="1" placeholder="Amount" required class="w-24 bg-surface border border-border rounded-lg px-2 py-1.5 text-xs text-white focus:outline-none focus:ring-2 focus:ring-brand/50">
                                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition">+ Add</button>
                            </form>
                        </td>
                    </tr>
                    {{else}}
                    <tr><td colspan="4" class="px-5 py-8 text-center text-gray-500">No resellers yet</td></tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</div>
