services:
  app:
    build: .
    container_name: routevpn
    restart: unless-stopped
    network_mode: "host"
    environment:
      - TZ=Asia/Dhaka
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:18.3-alpine3.23
    container_name: routevpn-db
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      TZ: Asia/Dhaka
      POSTGRES_USER: routevpn
      POSTGRES_PASSWORD: routevpn
      POSTGRES_DB: routevpn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routevpn -d routevpn"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    image: valkey/valkey:9.0.3-alpine3.23
    container_name: routevpn-cache
    restart: unless-stopped
    command: valkey-server /usr/local/etc/valkey/valkey.conf
    environment:
      TZ: Asia/Dhaka
    ports:
      - "6379:6379"
    volumes:
      - vkdata:/data
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  vkdata:
