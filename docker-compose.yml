
services:
  app:
    build: .
    container_name: routevpn
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static

  postgres:
    image: postgres:16-alpine
    container_name: routevpn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: routevpn
      POSTGRES_PASSWORD: routevpn
      POSTGRES_DB: routevpn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routevpn"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: routevpn-cache
    restart: unless-stopped
    volumes:
      - vkdata:/data

volumes:
  pgdata:
  vkdata:
